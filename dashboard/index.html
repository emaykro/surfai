<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SURFAI Dashboard</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #232734;
      --border: #2e3345;
      --text: #e1e4ed;
      --text-dim: #8b90a0;
      --accent: #6c7cff;
      --accent-dim: rgba(108,124,255,0.15);
      --green: #34d399;
      --red: #f87171;
      --orange: #fbbf24;
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: grid;
      grid-template-columns: 320px 1fr;
      grid-template-rows: 56px 1fr;
      overflow: hidden;
    }

    /* Header */
    header {
      grid-column: 1 / -1;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    header h1 span { color: var(--accent); }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--green);
      background: rgba(52,211,153,0.1);
      padding: 4px 10px;
      border-radius: 12px;
    }

    .live-dot {
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .header-stats {
      margin-left: auto;
      display: flex;
      gap: 20px;
      font-size: 13px;
      color: var(--text-dim);
    }

    .header-stats strong {
      color: var(--text);
      font-weight: 500;
    }

    /* Top-bar nav link */
    header a.nav-link {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 12px;
      background: var(--surface2);
    }
    header a.nav-link:hover { color: var(--text); }

    /* ML retrain readiness widget. Three states:
       - waiting (default): default palette
       - close (<=14 days ETA): amber
       - ready (>= target): green */
    .header-stats span.ml-state-close  strong { color: #f5b86a; }
    .header-stats span.ml-state-ready  strong { color: #7cd17c; }
    .header-stats span#ml-readiness-wrap { cursor: help; }

    /* Sidebar — session list */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-header h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
    }

    .sidebar-header button {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
    }

    .sidebar-header button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .session-item {
      padding: 10px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      margin-bottom: 4px;
      transition: background 0.15s;
    }

    .session-item:hover { background: var(--surface2); }
    .session-item.active { background: var(--accent-dim); border: 1px solid var(--accent); }

    .session-id {
      font-size: 12px;
      font-family: monospace;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 12px;
      margin-top: 4px;
      font-size: 11px;
      color: var(--text-dim);
    }

    /* Main area */
    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      padding: 0 16px;
    }

    .tab {
      padding: 10px 16px;
      font-size: 13px;
      color: var(--text-dim);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }

    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Tab content */
    .tab-content { flex: 1; overflow: hidden; display: none; }
    .tab-content.active { display: flex; flex-direction: column; }

    /* Live feed */
    .live-feed {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      font-family: monospace;
      font-size: 12px;
      line-height: 1.8;
    }

    .feed-entry {
      display: flex;
      gap: 12px;
      padding: 2px 0;
      opacity: 0;
      animation: fadeIn 0.3s forwards;
    }

    @keyframes fadeIn { to { opacity: 1; } }

    .feed-time { color: var(--text-dim); flex-shrink: 0; }
    .feed-session { color: var(--accent); width: 80px; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }

    .feed-type {
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
      flex-shrink: 0;
      width: 90px;
      text-align: center;
    }

    .feed-type.mouse { background: rgba(99,102,241,0.2); color: #818cf8; }
    .feed-type.scroll { background: rgba(52,211,153,0.2); color: #34d399; }
    .feed-type.idle { background: rgba(251,191,36,0.2); color: #fbbf24; }
    .feed-type.click { background: rgba(248,113,113,0.2); color: #f87171; }
    .feed-type.form { background: rgba(192,132,252,0.2); color: #c084fc; }
    .feed-type.engagement { background: rgba(45,212,191,0.2); color: #2dd4bf; }
    .feed-type.session { background: rgba(251,146,60,0.2); color: #fb923c; }
    .feed-type.context { background: rgba(148,163,184,0.2); color: #94a3b8; }
    .feed-type.cross_session { background: rgba(244,114,182,0.2); color: #f472b6; }
    .feed-type.goal { background: rgba(52,211,153,0.2); color: #34d399; }

    .feed-data { color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Conversion badge */
    .conv-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 3px;
      background: rgba(52,211,153,0.15);
      color: var(--green);
    }

    .intent-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 5px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      position: relative;
    }
    .intent-bar-fill {
      height: 4px;
      border-radius: 2px;
      transition: width 0.3s;
    }
    .intent-label {
      position: absolute;
      right: 0;
      top: -14px;
      font-size: 10px;
      font-weight: 600;
    }

    /* Conversion filter */
    .filter-bar {
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 6px;
    }

    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    /* Goal timeline in detail */
    .goal-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .goal-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--surface2);
      border-radius: var(--radius);
      font-size: 12px;
    }

    .goal-item .goal-name { color: var(--green); font-weight: 600; }
    .goal-item .goal-time { color: var(--text-dim); font-family: monospace; font-size: 11px; }
    .goal-item .goal-source { color: var(--text-dim); font-size: 10px; padding: 1px 5px; background: var(--surface); border-radius: 3px; }

    /* Session detail */
    .session-detail {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .detail-header {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      min-width: 140px;
    }

    .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 20px; font-weight: 600; margin-top: 4px; }

    /* Replay canvas */
    .replay-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }

    .replay-section h3 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .replay-canvas-wrap {
      position: relative;
      background: #fff;
      border-radius: 4px;
      overflow: hidden;
    }

    .replay-canvas-wrap canvas {
      display: block;
      width: 100%;
    }

    .replay-controls {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      align-items: center;
    }

    .replay-controls button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
    }

    .replay-controls button:hover { opacity: 0.85; }

    .replay-controls .speed {
      font-size: 12px;
      color: var(--text-dim);
      margin-left: auto;
    }

    .replay-progress {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }

    .replay-progress-bar {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.1s linear;
    }

    /* Event timeline */
    .timeline-canvas-wrap {
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
    }

    .timeline-canvas-wrap canvas {
      display: block;
      width: 100%;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      font-size: 14px;
      gap: 8px;
    }

    .empty-state .icon { font-size: 32px; opacity: 0.5; }

    /* Dimension filter selects in sidebar */
    .dim-filters {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }

    .dim-filters select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 11px;
      padding: 4px 6px;
      border-radius: 4px;
      cursor: pointer;
      appearance: none;
      width: 100%;
    }

    .dim-filters select:hover { border-color: var(--accent); }
    .dim-filters select.active { border-color: var(--accent); color: var(--text); }

    .dim-filters .clear-btn {
      grid-column: 1 / -1;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 3px 0;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      display: none;
    }

    .dim-filters .clear-btn.visible { display: block; }
    .dim-filters .clear-btn:hover { border-color: var(--accent); color: var(--accent); }

    .session-ctx {
      width: 100%;
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Segments tab content */
    .segments-panel {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-content: start;
    }

    .seg-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }

    .seg-card h3 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .seg-row {
      display: grid;
      grid-template-columns: 90px 1fr 52px;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .seg-row:last-child { margin-bottom: 0; }

    .seg-label {
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }

    .seg-label:hover { color: var(--accent); }

    .seg-bar-wrap {
      background: var(--surface2);
      border-radius: 2px;
      height: 6px;
      overflow: hidden;
    }

    .seg-bar {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .seg-count {
      color: var(--text-dim);
      text-align: right;
      font-family: monospace;
      font-size: 11px;
    }

    .seg-conv {
      font-size: 10px;
      color: var(--green);
      margin-top: 1px;
      text-align: right;
      font-family: monospace;
    }

    /* LCP color coding */
    .lcp-good    { background: var(--green); }
    .lcp-needs   { background: var(--orange); }
    .lcp-poor    { background: var(--red); }
    .lcp-unknown { background: var(--text-dim); }

    /* Bot risk color coding */
    .bot-none   { background: var(--green); }
    .bot-low    { background: #60a5fa; }
    .bot-medium { background: var(--orange); }
    .bot-high   { background: var(--red); }
    .bot-unknown { background: var(--text-dim); }

    /* Session context block */
    .ctx-block h3 { margin-bottom: 10px; }
    .ctx-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 6px 16px;
    }
    .ctx-item { display: flex; flex-direction: column; gap: 2px; }
    .ctx-key { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.4px; }
    .ctx-val { font-size: 12px; color: var(--text); }
    .ctx-risk-none   { color: var(--green); }
    .ctx-risk-low    { color: #60a5fa; }
    .ctx-risk-medium { color: var(--orange); }
    .ctx-risk-high   { color: var(--red); }
    .ctx-lcp-good  { color: var(--green); }
    .ctx-lcp-needs { color: var(--orange); }
    .ctx-lcp-poor  { color: var(--red); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
  </style>
</head>
<body>
  <header>
    <h1><span>SURF</span>AI</h1>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <a href="/dashboard/reconciliation.html" class="nav-link" title="Metrica vs SURFAI daily reconciliation">Reconciliation →</a>
    <a href="/dashboard/sites.html" class="nav-link" title="Per-site health last 48h">Site Health →</a>
    <div class="header-stats">
      <span>Sessions: <strong id="total-sessions">0</strong></span>
      <span>Conversions: <strong id="total-conversions">0</strong></span>
      <span>Conv. Rate: <strong id="conv-rate">0%</strong></span>
      <span>Events/min: <strong id="events-per-min">0</strong></span>
      <span id="ml-readiness-wrap" title="Enriched conversions (post-2026-04-10) accumulating toward the CatBoost retrain target.">ML: <strong id="ml-readiness">…</strong></span>
    </div>
  </header>

  <div class="sidebar">
    <div class="sidebar-header">
      <h2>Sessions</h2>
      <button id="refresh-btn">Refresh</button>
    </div>
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="converted">Converted</button>
      <button class="filter-btn" data-filter="not-converted">Not Conv.</button>
    </div>
    <div class="dim-filters" id="dim-filters">
      <select id="filter-source" title="Traffic source">
        <option value="">Source: all</option>
      </select>
      <select id="filter-country" title="Country">
        <option value="">Country: all</option>
      </select>
      <select id="filter-device" title="Device type">
        <option value="">Device: all</option>
      </select>
      <select id="filter-bot" title="Bot risk">
        <option value="">Bot risk: all</option>
      </select>
      <button class="clear-btn" id="clear-dim-filters">✕ Clear filters</button>
    </div>
    <div class="session-list" id="session-list">
      <div class="empty-state">
        <div class="icon">...</div>
        Loading sessions
      </div>
    </div>
  </div>

  <div class="main">
    <div class="tabs">
      <div class="tab active" data-tab="live">Live Feed</div>
      <div class="tab" data-tab="segments">Segments</div>
      <div class="tab" data-tab="detail">Session Detail</div>
    </div>

    <!-- Live Feed tab -->
    <div class="tab-content active" id="tab-live">
      <div class="live-feed" id="live-feed">
        <div class="empty-state">
          <div class="icon">~</div>
          Waiting for events...
        </div>
      </div>
    </div>

    <!-- Segments tab -->
    <div class="tab-content" id="tab-segments">
      <div class="segments-panel" id="segments-panel">
        <div class="empty-state" style="grid-column:1/-1">
          <div class="icon">~</div>Loading segments…
        </div>
      </div>
    </div>

    <!-- Session Detail tab -->
    <div class="tab-content" id="tab-detail">
      <div class="session-detail" id="session-detail">
        <div class="empty-state">
          <div class="icon">&lt;-</div>
          Select a session from the sidebar
        </div>
      </div>
    </div>
  </div>

  <script>
    // =========================================================================
    // SURFAI Dashboard — vanilla JS, zero deps
    // =========================================================================

    const API = window.location.origin;

    /** Escape HTML entities to prevent XSS when inserting into innerHTML templates */
    function esc(str) {
      const d = document.createElement("div");
      d.textContent = String(str == null ? "" : str);
      return d.innerHTML;
    }

    /** Read operator token from localStorage */
    function getOperatorToken() {
      return localStorage.getItem("surfai_operator_token") || "";
    }

    /** Authenticated fetch wrapper */
    function authFetch(url, opts = {}) {
      const token = getOperatorToken();
      const headers = { ...(opts.headers || {}) };
      if (token) headers["Authorization"] = "Bearer " + token;
      return fetch(url, { ...opts, headers });
    }
    let selectedSessionId = null;
    let replayAnimation = null;
    let currentFilter = "all";
    let allSessions = [];
    let dimFilter = { traffic_source: "", country: "", device_type: "", bot_risk: "" };

    // --- Event rate tracking -------------------------------------------------

    const recentEvents = [];

    function trackEventRate(count) {
      recentEvents.push({ ts: Date.now(), count });
      const cutoff = Date.now() - 60_000;
      while (recentEvents.length && recentEvents[0].ts < cutoff) recentEvents.shift();
      const total = recentEvents.reduce((s, e) => s + e.count, 0);
      document.getElementById("events-per-min").textContent = total;
    }

    // --- Tabs -----------------------------------------------------------------

    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
        document.querySelectorAll(".tab-content").forEach((c) => c.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById("tab-" + tab.dataset.tab).classList.add("active");
      });
    });

    // --- Session list --------------------------------------------------------

    async function loadSessions() {
      try {
        const qs = new URLSearchParams({ limit: "100" });
        if (dimFilter.traffic_source) qs.set("traffic_source", dimFilter.traffic_source);
        if (dimFilter.country)        qs.set("country",        dimFilter.country);
        if (dimFilter.device_type)    qs.set("device_type",    dimFilter.device_type);
        if (dimFilter.bot_risk)       qs.set("bot_risk",       dimFilter.bot_risk);
        const res = await authFetch(API + "/api/sessions?" + qs.toString());
        const data = await res.json();
        allSessions = data.sessions;

        // converted / intent_score / geo / device come directly from the list API
        // (LEFT JOIN session_features in the query) — no per-session round-trips needed
        allSessions.forEach((s) => {
          s.intent_score = s.model_prediction_score ?? null;
        });

        renderSessionList();
        updateHeaderStats();
      } catch (err) {
        console.error("Failed to load sessions:", err);
      }
    }

    function updateHeaderStats() {
      const total = allSessions.length;
      const converted = allSessions.filter((s) => s.converted).length;
      const rate = total > 0 ? Math.round((converted / total) * 100) : 0;

      document.getElementById("total-sessions").textContent = total;
      document.getElementById("total-conversions").textContent = converted;
      document.getElementById("conv-rate").textContent = rate + "%";
    }

    function renderSessionList() {
      const el = document.getElementById("session-list");
      let sessions = allSessions;

      if (currentFilter === "converted") sessions = sessions.filter((s) => s.converted);
      else if (currentFilter === "not-converted") sessions = sessions.filter((s) => !s.converted);

      if (!sessions.length) {
        el.innerHTML = '<div class="empty-state"><div class="icon">0</div>No sessions</div>';
        return;
      }

      el.innerHTML = "";
      sessions.forEach((s) => {
        const shortId = s.session_id.slice(0, 8);
        const ago = timeAgo(new Date(s.last_seen_at));
        const active = s.session_id === selectedSessionId ? " active" : "";

        const item = document.createElement("div");
        item.className = "session-item" + active;
        item.dataset.id = s.session_id;

        idDiv.className = "session-id";
        idDiv.textContent = shortId + "..." + s.session_id.slice(-4) + " ";

          badge.className = "conv-badge";
          badge.textContent = "CONV" + (s.conversion_count > 1 ? " x" + s.conversion_count : "");
          idDiv.appendChild(badge);
        }

        const metaDiv = document.createElement("div");
        metaDiv.className = "session-meta";
        const evSpan = document.createElement("span");
        evSpan.textContent = s.event_count + " events";
        const agoSpan = document.createElement("span");
        agoSpan.textContent = ago;
        metaDiv.appendChild(evSpan);
        metaDiv.appendChild(agoSpan);

        if (s.geo_country || s.ctx_device_type || s.ctx_browser) {

          if (s.ctx_device_type) parts.push(s.ctx_device_type);
          if (s.ctx_browser) parts.push(s.ctx_browser);
          ctxSpan.textContent = parts.join(" · ");
          metaDiv.appendChild(ctxSpan);

        item.appendChild(idDiv);
        item.appendChild(metaDiv);

        if (s.intent_score !== null && s.intent_score !== undefined) {
          const scoreBar = document.createElement("div");
          scoreBar.className = "intent-bar";
          const pct = Math.round(s.intent_score * 100);
          const color = pct >= 70 ? "#ef4444" : pct >= 40 ? "#f59e0b" : "#6b7280";
          scoreBar.innerHTML =
            `<div class="intent-bar-fill" style="width:${pct}%;background:${color}"></div>` +
            `<span class="intent-label" style="color:${color}">${pct}%</span>`;

        el.appendChild(item);

        btn.classList.add("active");

        renderSessionList();
      });
    });

    function timeAgo(date) {
      const s = Math.floor((Date.now() - date.getTime()) / 1000);
      if (s < 60) return s + "s ago";
      if (s < 3600) return Math.floor(s / 60) + "m ago";
      if (s < 86400) return Math.floor(s / 3600) + "h ago";
      return Math.floor(s / 86400) + "d ago";
    }

    // --- Mouse trail replay --------------------------------------------------

    function initReplay(mouseEvents) {
      const canvas = document.getElementById("replay-canvas");
      const ctx = canvas.getContext("2d");

      // Find bounds
      let maxX = 0, maxY = 0;
      mouseEvents.forEach((e) => {
        if (e.data.x > maxX) maxX = e.data.x;
        if (e.data.y > maxY) maxY = e.data.y;
      });
      maxX = Math.max(maxX, 960);
      maxY = Math.max(maxY, 540);

      const scaleX = canvas.width / maxX;
      const scaleY = canvas.height / maxY;

      let playing = false;
      let idx = 0;

      function drawFrame() {
        // Trail fading
        ctx.fillStyle = "rgba(255,255,255,0.03)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const speed = parseInt(document.getElementById("replay-speed").value, 10);
        const batchSize = Math.max(1, speed);

        for (let i = 0; i < batchSize && idx < mouseEvents.length; i++, idx++) {
          const e = mouseEvents[idx];
          const x = e.data.x * scaleX;
          const y = e.data.y * scaleY;

          // Trail dot
          ctx.beginPath();
          ctx.arc(x, y, 3, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(108,124,255,0.8)";
          ctx.fill();

          // Connection line
          if (idx > 0) {
            const prev = mouseEvents[idx - 1];
            ctx.beginPath();
            ctx.moveTo(prev.data.x * scaleX, prev.data.y * scaleY);
            ctx.lineTo(x, y);
            ctx.strokeStyle = "rgba(108,124,255,0.3)";
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }

        // Progress bar
        const pct = (idx / mouseEvents.length) * 100;
        document.getElementById("replay-bar").style.width = pct + "%";

        if (idx < mouseEvents.length && playing) {
          replayAnimation = requestAnimationFrame(drawFrame);
        } else {
          playing = false;
        }
      }

      // Clear canvas to white
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      document.getElementById("replay-play").addEventListener("click", () => {
        if (playing) {
          playing = false;
          if (replayAnimation) cancelAnimationFrame(replayAnimation);
          return;
        }
        if (idx >= mouseEvents.length) idx = 0;
        playing = true;
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawFrame();
      });

      document.getElementById("replay-reset").addEventListener("click", () => {
        playing = false;
        if (replayAnimation) cancelAnimationFrame(replayAnimation);
        idx = 0;
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        document.getElementById("replay-bar").style.width = "0%";
      });
    }

    // --- Click heatmap -------------------------------------------------------

    function drawClickHeatmap(clickEvents) {
      const canvas = document.getElementById("click-canvas");
      const ctx = canvas.getContext("2d");

      let maxX = 0, maxY = 0;
      clickEvents.forEach((e) => {
        if (e.data.x > maxX) maxX = e.data.x;
        if (e.data.y > maxY) maxY = e.data.y;
      });
      maxX = Math.max(maxX, 960);
      maxY = Math.max(maxY, 540);

      const scaleX = canvas.width / maxX;
      const scaleY = canvas.height / maxY;

      // White background
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw heatmap circles
      clickEvents.forEach((e) => {
        const x = e.data.x * scaleX;
        const y = e.data.y * scaleY;

        const gradient = ctx.createRadialGradient(x, y, 0, x, y, 30);
        gradient.addColorStop(0, "rgba(248,113,113,0.6)");
        gradient.addColorStop(1, "rgba(248,113,113,0)");
        ctx.fillStyle = gradient;
        ctx.fillRect(x - 30, y - 30, 60, 60);

        // Center dot
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(220,38,38,0.9)";
        ctx.fill();
      });
    }

    // --- Scroll depth chart --------------------------------------------------

    function drawScrollChart(scrollEvents, firstTs) {
      const canvas = document.getElementById("scroll-canvas");
      const ctx = canvas.getContext("2d");
      const w = canvas.width, h = canvas.height;
      const pad = 40;

      ctx.fillStyle = "#1a1d27";
      ctx.fillRect(0, 0, w, h);

      if (scrollEvents.length < 2) return;

      const totalDuration = scrollEvents[scrollEvents.length - 1].ts - firstTs;
      if (totalDuration === 0) return;

      // Grid lines
      ctx.strokeStyle = "rgba(255,255,255,0.08)";
      ctx.lineWidth = 1;
      for (let p = 0; p <= 100; p += 25) {
        const y = pad + ((100 - p) / 100) * (h - pad * 2);
        ctx.beginPath();
        ctx.moveTo(pad, y);
        ctx.lineTo(w - 10, y);
        ctx.stroke();

        ctx.fillStyle = "#8b90a0";
        ctx.font = "10px monospace";
        ctx.textAlign = "right";
        ctx.fillText(p + "%", pad - 5, y + 3);
      }

      // Draw scroll line
      ctx.beginPath();
      ctx.strokeStyle = "#34d399";
      ctx.lineWidth = 2;

      scrollEvents.forEach((e, i) => {
        const x = pad + ((e.ts - firstTs) / totalDuration) * (w - pad - 10);
        const y = pad + ((100 - (e.data.percent || 0)) / 100) * (h - pad * 2);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();

      // Fill under curve
      const lastX = pad + ((scrollEvents[scrollEvents.length - 1].ts - firstTs) / totalDuration) * (w - pad - 10);
      ctx.lineTo(lastX, h - pad);
      ctx.lineTo(pad, h - pad);
      ctx.closePath();
      ctx.fillStyle = "rgba(52,211,153,0.1)";
      ctx.fill();
    }

    // --- Event timeline (all types) ------------------------------------------

    function drawTimeline(events, firstTs, lastTs) {
      const canvas = document.getElementById("timeline-canvas");
      const ctx = canvas.getContext("2d");
      const w = canvas.width, h = canvas.height;

      ctx.fillStyle = "#1a1d27";
      ctx.fillRect(0, 0, w, h);

      if (!events.length || firstTs === lastTs) return;

      const duration = lastTs - firstTs;
      const typeColors = {
        mouse: "#818cf8",
        scroll: "#34d399",
        idle: "#fbbf24",
        click: "#f87171",
        form: "#c084fc",
        engagement: "#2dd4bf",
        session: "#fb923c",
        context: "#94a3b8",
        cross_session: "#f472b6",
        goal: "#10b981",
      };

      const types = Object.keys(typeColors);
      const rowH = h / types.length;

      // Type labels
      ctx.font = "10px monospace";
      ctx.textAlign = "left";

      types.forEach((type, i) => {
        const y = i * rowH;
        ctx.fillStyle = typeColors[type];
        ctx.globalAlpha = 0.15;
        ctx.fillRect(0, y, w, rowH);
        ctx.globalAlpha = 1;
        ctx.fillStyle = typeColors[type];
        ctx.fillText(type, 4, y + rowH / 2 + 3);
      });

      // Draw event marks
      events.forEach((e) => {
        const typeIdx = types.indexOf(e.type);
        if (typeIdx < 0) return;

        const x = 80 + ((e.ts - firstTs) / duration) * (w - 90);
        const y = typeIdx * rowH;

        ctx.fillStyle = typeColors[e.type];
        ctx.globalAlpha = 0.7;
        ctx.fillRect(x, y + 2, 2, rowH - 4);
        ctx.globalAlpha = 1;
      });
    }

    // --- SSE live feed -------------------------------------------------------

    function connectSSE() {
      const feed = document.getElementById("live-feed");
      let hasEvents = false;

      const token = getOperatorToken();
      const sseUrl = API + "/api/events/live" + (token ? "?token=" + encodeURIComponent(token) : "");
      const source = new EventSource(sseUrl);

      source.onmessage = (event) => {
        const batch = JSON.parse(event.data);
        if (!hasEvents) {
          feed.innerHTML = "";
          hasEvents = true;
        }

        trackEventRate(batch.events.length);

        batch.events.forEach((e) => {
          const entry = document.createElement("div");
          entry.className = "feed-entry";

          const time = new Date().toLocaleTimeString("en-US", { hour12: false });
          const shortSession = String(batch.sessionId).slice(0, 8);
          const dataStr = JSON.stringify(e.data);

          const timeSpan = document.createElement("span");
          timeSpan.className = "feed-time";
          timeSpan.textContent = time;

          const sessSpan = document.createElement("span");
          sessSpan.className = "feed-session";
          sessSpan.textContent = shortSession;

          const typeSpan = document.createElement("span");
          typeSpan.className = "feed-type " + esc(e.type);
          typeSpan.textContent = e.type;

          const dataSpan = document.createElement("span");
          dataSpan.className = "feed-data";
          dataSpan.textContent = dataStr;

          entry.appendChild(timeSpan);
          entry.appendChild(sessSpan);
          entry.appendChild(typeSpan);
          entry.appendChild(dataSpan);

          feed.prepend(entry);

          // Keep max 500 entries
          while (feed.children.length > 500) feed.lastChild.remove();
        });

        // Refresh session list periodically
        loadSessions();
      };

      source.onerror = () => {
        setTimeout(connectSSE, 3000);
        source.close();
      };
    }

    // --- ML retrain readiness widget -----------------------------------------

    async function loadMlReadiness() {
      const wrap = document.getElementById("ml-readiness-wrap");
      const val = document.getElementById("ml-readiness");
      if (!wrap || !val) return;
      try {
        const res = await authFetch(API + "/api/ml/readiness");
        if (!res.ok) {
          val.textContent = "n/a";
          return;
        }
        const d = await res.json();
        const enr = d.enriched_conversions;
        const tgt = d.target_conversions;
        let label = `${enr} / ${tgt}`;
        if (d.ready) {
          label += " (ready)";
        } else if (d.eta_date) {
          const eta = new Date(d.eta_date);
          const etaStr = eta.toLocaleDateString("en-GB", { day: "numeric", month: "short" });
          label += ` (ETA ${etaStr})`;
        }
        val.textContent = label;
        wrap.classList.remove("ml-state-close", "ml-state-ready");
        if (d.ready) wrap.classList.add("ml-state-ready");
        else if (d.eta_days != null && d.eta_days <= 14) wrap.classList.add("ml-state-close");
        // Richer tooltip with the raw numbers.
        const rate = d.daily_rate != null ? d.daily_rate.toFixed(2) : "—";
        wrap.title =
          `Enriched conversions: ${enr} / ${tgt} target\n` +
          `Total conversions (pre + post enrichment): ${d.total_conversions}\n` +
          `Daily rate: ${rate}/day\n` +
          (d.eta_date ? `ETA to target: ${d.eta_date} (${d.eta_days} day${d.eta_days === 1 ? "" : "s"})` : "ETA: n/a");
      } catch (err) {
        console.error("Failed to load ML readiness:", err);
        val.textContent = "n/a";
      }
    }

    // --- Segments (stats) ----------------------------------------------------

    async function loadStats() {

        const res = await authFetch(API + "/api/sessions/stats");
        if (!res.ok) return;
        const data = await res.json();
        renderStats(data);
        populateFilterOptions(data);

        console.error("Failed to load stats:", err);

    function renderStats(data) {
      const panel = document.getElementById("segments-panel");

      const sections = [
        { title: "Traffic Source", rows: data.traffic_sources, colorFn: () => "var(--accent)", hasConv: true },
        { title: "Country",        rows: data.countries,       colorFn: () => "#60a5fa",       hasConv: true },
        { title: "Device Type",    rows: data.device_types,    colorFn: () => "#c084fc",       hasConv: true },
        {
          title: "Bot Risk", rows: data.bot_risk, hasConv: false,
          colorFn: (v) => ({ none: "var(--green)", low: "#60a5fa", medium: "var(--orange)", high: "var(--red)" }[v] || "var(--text-dim)"),
        },
        {
          title: "LCP (Core Web Vital)", rows: data.lcp_buckets, hasConv: false,
          colorFn: (v) => ({ good: "var(--green)", needs_improvement: "var(--orange)", poor: "var(--red)" }[v] || "var(--text-dim)"),
        },
      ];

      const hasCountry = data.countries && data.countries.length > 0;

      panel.innerHTML = sections.map(({ title, rows, colorFn, hasConv }) => {
        if (!rows || !rows.length) return "";
        const maxSessions = Math.max(...rows.map((r) => r.sessions || 0), 1);

        const rowsHtml = rows.map((r) => {
          const pct = Math.round(((r.sessions || 0) / maxSessions) * 100);
          const convRate = (r.conversions && r.sessions)
            ? Math.round((r.conversions / r.sessions) * 100) : 0;
          const convLabel = hasConv && r.conversions
            ? `<div class="seg-conv">${r.conversions} conv (${convRate}%)</div>` : "";
          const color = colorFn(r.value);

          return `<div class="seg-row">
            <div class="seg-label" title="${esc(r.value)}" data-dim-val="${esc(r.value)}">${esc(r.value)}</div>
            <div>
              <div class="seg-bar-wrap">
                <div class="seg-bar" style="width:${pct}%;background:${color}"></div>
              </div>
              ${convLabel}
            </div>
            <div class="seg-count">${r.sessions}</div>
          </div>`;
        }).join("");

        return `<div class="seg-card"><h3>${esc(title)}</h3>${rowsHtml}</div>`;
      }).join("") + (hasCountry
        ? `<div style="grid-column:1/-1;text-align:right;font-size:10px;color:var(--text-dim);padding:4px 0">IP Geolocation by <a href="https://db-ip.com/" target="_blank" rel="noopener" style="color:var(--text-dim);text-decoration:underline">DB-IP</a></div>`
        : "");
    }

    function populateFilterOptions(data) {
      function fill(selectId, rows, label) {
        const sel = document.getElementById(selectId);
        const current = sel.value;
        sel.innerHTML = `<option value="">${label}: all</option>` +
          (rows || []).map((r) => `<option value="${esc(r.value)}">${esc(r.value)} (${r.sessions})</option>`).join("");
        if (current) sel.value = current;
      }
      fill("filter-source",  data.traffic_sources, "Source");
      fill("filter-country", data.countries,        "Country");
      fill("filter-device",  data.device_types,     "Device");
      fill("filter-bot",     data.bot_risk,         "Bot risk");
    }

    // --- Dimension filter controls -------------------------------------------

    function updateClearBtn() {
      const active = Object.values(dimFilter).some(Boolean);
      document.getElementById("clear-dim-filters").classList.toggle("visible", active);
      ["filter-source", "filter-country", "filter-device", "filter-bot"].forEach((id) => {
        const sel = document.getElementById(id);
        sel.classList.toggle("active", !!sel.value);
      });
    }

    [
      ["filter-source",  "traffic_source"],
      ["filter-country", "country"],
      ["filter-device",  "device_type"],
      ["filter-bot",     "bot_risk"],
    ].forEach(([id, key]) => {
      document.getElementById(id).addEventListener("change", (e) => {
        dimFilter[key] = e.target.value;
        updateClearBtn();
        loadSessions();
      });
    });

    document.getElementById("clear-dim-filters").addEventListener("click", () => {
      dimFilter = { traffic_source: "", country: "", device_type: "", bot_risk: "" };
      ["filter-source", "filter-country", "filter-device", "filter-bot"].forEach((id) => {
        document.getElementById(id).value = "";
      });
      updateClearBtn();
      loadSessions();
    });

    // Load stats when Segments tab is first opened
    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        if (tab.dataset.tab === "segments") loadStats();
      });
    });

    // --- Init ----------------------------------------------------------------

    loadSessions();
    connectSSE();
    loadMlReadiness();
    setInterval(loadMlReadiness, 5 * 60 * 1000); // refresh every 5 min
  </script>
</body>
</html>
