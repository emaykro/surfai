# SURFAI — Nginx reverse proxy
# Place in /etc/nginx/sites-available/surfai.conf
# Symlink to /etc/nginx/sites-enabled/surfai.conf
#
# Does NOT touch htracker.ru config — completely separate server block.

upstream surfai_backend {
    server 127.0.0.1:3100;
    keepalive 16;
}

server {
    listen 80;
    server_name surfai.ru app.surfai.ru api.surfai.ru cdn.surfai.ru;

    # --- PUBLIC endpoints (no auth) ---

    # Ingest endpoint — must be open for SDK on client sites
    location = /api/events {
        client_max_body_size 256k;

        proxy_pass http://surfai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Server-side conversions — open for backend integrations
    location = /api/conversions {
        proxy_pass http://surfai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # SDK static files — must be open for script loading on client sites
    location /dist/ {
        proxy_pass http://surfai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";

        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin "*";
    }

    # --- PROTECTED endpoints (basic auth) ---

    # Dashboard
    location /dashboard/ {
        auth_basic "SURFAI";
        auth_basic_user_file /etc/nginx/.htpasswd-surfai;

        proxy_pass http://surfai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Operator cabinet
    location /cabinet/ {
        auth_basic "SURFAI";
        auth_basic_user_file /etc/nginx/.htpasswd-surfai;

        proxy_pass http://surfai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # SSE live feed — protected (used by dashboard)
    location = /api/events/live {
        auth_basic "SURFAI";
        auth_basic_user_file /etc/nginx/.htpasswd-surfai;

        proxy_pass http://surfai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding off;
    }

    # Management API — protected (projects, sites, goals, sessions)
    location /api/ {
        auth_basic "SURFAI";
        auth_basic_user_file /etc/nginx/.htpasswd-surfai;

        proxy_pass http://surfai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Root — protected (E2E test page)
    location / {
        auth_basic "SURFAI";
        auth_basic_user_file /etc/nginx/.htpasswd-surfai;

        proxy_pass http://surfai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
    }
}
