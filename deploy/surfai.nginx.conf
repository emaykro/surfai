# SURFAI — Nginx reverse proxy
# Place in /etc/nginx/sites-available/surfai.conf
# Symlink to /etc/nginx/sites-enabled/surfai.conf
#
# Does NOT touch htracker.ru config — completely separate server block.

upstream surfai_backend {
    server 127.0.0.1:3100;
    keepalive 16;
}

server {
    listen 80;
    server_name surfai.ru app.surfai.ru api.surfai.ru cdn.surfai.ru;

    # Redirect HTTP -> HTTPS (enable after certbot)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://surfai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
    }

    # SSE endpoint — disable buffering for live event stream
    location = /api/events/live {
        proxy_pass http://surfai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding off;
    }

    # Dashboard — basic auth protection (optional but recommended)
    location /dashboard/ {
        # Uncomment these two lines after creating htpasswd file:
        # auth_basic "SURFAI Dashboard";
        # auth_basic_user_file /etc/nginx/.htpasswd-surfai;

        proxy_pass http://surfai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Operator cabinet — auth recommended before production
    location /cabinet/ {
        # Uncomment these two lines after creating htpasswd file:
        # auth_basic "SURFAI Cabinet";
        # auth_basic_user_file /etc/nginx/.htpasswd-surfai;

        proxy_pass http://surfai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Ingest endpoint — higher body size for large event batches
    location = /api/events {
        client_max_body_size 256k;

        proxy_pass http://surfai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # SDK static files — long cache for CDN subdomain
    location /dist/ {
        proxy_pass http://surfai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";

        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin "*";
    }
}
